name: Finance Content Automation Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  auto-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Auto-Discover Project Directory and Run NPM
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          GEMINI_TEXT_API_KEY: ${{ secrets.GEMINI_TEXT_API_KEY }}
          GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
        run: |
          # package.json ফাইলটি কোন ফোল্ডারে আছে তা খুঁজে বের করা
          TARGET_DIR=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \;)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "❌ Error: package.json file could not be found anywhere in the repository!"
            exit 1
          fi
          
          echo "🎯 Project directory found at: $TARGET_DIR"
          cd "$TARGET_DIR"
          
          echo "📦 Installing Dependencies..."
          npm install
          
          echo "🚀 Running Automation Script..."
          npm run start:automation
          
